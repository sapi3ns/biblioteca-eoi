<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catàleg Biblioteca EOI Sant Cugat</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f0f4f8;
  color: #1a1a2e;
}

header {
  background: #1a3c5e;
  color: white;
  padding: 20px;
  text-align: center;
}

header h1 {
  font-size: 28px;
  margin-bottom: 5px;
}

header p {
  font-size: 15px;
  opacity: 0.85;
}

.controls {
  background: white;
  padding: 14px 20px;
  border-bottom: 1px solid #dbe3ec;
  position: sticky;
  top: 0;
  z-index: 100;
}

.controls-inner {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.controls input,
.controls select {
  padding: 9px 12px;
  border: 1px solid #b8c4d2;
  border-radius: 8px;
  font-size: 14px;
  background: white;
}

.controls input {
  flex: 1 1 190px;
}

.controls select {
  flex: 1 1 150px;
}

.info-bar {
  padding: 10px 20px;
  background: #eaf3ff;
  border-bottom: 1px solid #c4daf5;
  font-size: 14px;
  color: #1e40af;
}

#status {
  padding: 30px;
  text-align: center;
  color: #64748b;
  font-size: 18px;
}

.catalogo {
  display: flex;
  flex-wrap: wrap;
  padding: 14px;
}

.card {
  background: white;
  border: 1px solid #dbe3ec;
  border-radius: 12px;
  padding: 16px;
  margin: 8px;
  width: calc(25% - 16px);
  min-width: 260px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.card:hover {
  box-shadow: 0 4px 14px rgba(0,0,0,0.14);
}

.card-ref {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 6px;
  font-family: monospace;
}

.card-title {
  font-weight: bold;
  font-size: 16px;
  line-height: 1.3;
  margin-bottom: 5px;
  color: #1a3c5e;
}

.card-author {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 10px;
  line-height: 1.4;
}

.badges {
  margin-bottom: 12px;
}

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  margin: 2px;
}

.badge-idioma {
  background: #dbeafe;
  color: #1d4ed8;
}

.badge-nivell {
  background: #ede9fe;
  color: #6d28d9;
}

.badge-genere {
  background: #fef3c7;
  color: #92400e;
}

.badge-ok {
  background: #d1fae5;
  color: #065f46;
}

.badge-prestat {
  background: #fee2e2;
  color: #991b1b;
}

.badge-audio {
  background: #e0f2fe;
  color: #0369a1;
}

.card-btn {
  width: 100%;
  padding: 9px;
  background: #2563eb;
  color: white;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}

.card-btn:hover {
  background: #1d4ed8;
}

.card-btn:disabled {
  background: #cbd5e0;
  cursor: not-allowed;
}

.pagination {
  text-align: center;
  padding: 20px;
}

.pagination button {
  padding: 8px 18px;
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  background: white;
  cursor: pointer;
  font-size: 14px;
  margin: 4px;
}

.pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.pagination span {
  font-size: 14px;
  color: #64748b;
  margin: 0 8px;
}

.modal-overlay {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
}

.modal {
  background: white;
  border-radius: 16px;
  padding: 26px;
  width: 90%;
  max-width: 460px;
  max-height: 90%;
  overflow-y: auto;
  margin: 40px auto;
}

.modal h2 {
  color: #1a3c5e;
  font-size: 22px;
  margin-bottom: 10px;
}

.book-info {
  background: #f8fafc;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 18px;
  font-size: 14px;
  color: #475569;
}

.modal label {
  display: block;
  margin-bottom: 4px;
  font-size: 13px;
  font-weight: bold;
  color: #374151;
}

.modal input,
.modal select,
.modal textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #cbd5e0;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 14px;
  font-family: Arial, Helvetica, sans-serif;
  background: white;
}

.modal textarea {
  height: 70px;
  resize: vertical;
}

.modal-btns {
  display: flex;
  gap: 10px;
}

.modal-btns button {
  flex: 1;
  padding: 10px;
  border: 0;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
  font-weight: bold;
}

.btn-cancel {
  background: #f1f5f9;
  color: #374151;
}

.btn-send {
  background: #2563eb;
  color: white;
}

.btn-send:hover {
  background: #1d4ed8;
}

#ttip {
  position: fixed;
  background: #1a3c5e;
  color: white;
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.4;
  max-width: 260px;
  text-align: center;
  pointer-events: none;
  display: none;
  z-index: 9999;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}

@media screen and (max-width: 1200px) {
  .card {
    width: calc(33.333% - 16px);
  }
}

@media screen and (max-width: 900px) {
  .card {
    width: calc(50% - 16px);
  }
}

@media screen and (max-width: 600px) {
  header h1 {
    font-size: 22px;
  }

  .card {
    width: calc(100% - 16px);
  }

  .controls {
    position: static;
  }

  .modal {
    margin: 20px auto;
  }
}
</style>
</head>

<body>

<header>
  <h1>Biblioteca EOI Sant Cugat</h1>
  <p>Catàleg de préstec</p>
</header>

<div class="controls">
  <div class="controls-inner">
    <input type="text" id="cercaTitol" placeholder="Cerca per títol..." onkeyup="filtrar()">
    <input type="text" id="cercaAutor" placeholder="Cerca per autor..." onkeyup="filtrar()">

    <select id="filtreIdioma" onchange="filtrar()">
      <option value="">Tots els idiomes</option>
    </select>

    <select id="filtreNivell" onchange="filtrar()">
      <option value="">Tots els nivells</option>
    </select>

    <select id="filtreGenere" onchange="filtrar()">
      <option value="">Tots els gèneres</option>
    </select>

    <select id="filtreDisp" onchange="filtrar()">
      <option value="">Tots</option>
      <option value="1">Disponibles</option>
      <option value="0">En préstec</option>
    </select>
  </div>
</div>

<div class="info-bar" id="infoBar">Carregant...</div>

<div id="status">Carregant el catàleg...</div>

<div class="catalogo" id="catalogo"></div>

<div class="pagination" id="pagination"></div>

<div id="ttip"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Sol·licitar préstec</h2>

    <div class="book-info" id="modalBookInfo"></div>

    <label>Nom i cognoms *</label>
    <input type="text" id="mNom" placeholder="Anna García López">

    <label>Curs *</label>
    <select id="mCurs">
      <option value="">— Selecciona el teu curs —</option>
      <option value="A1">A1</option>
      <option value="A2">A2</option>
      <option value="B1">B1</option>
      <option value="B2.1">B2.1</option>
      <option value="B2.2">B2.2</option>
      <option value="C1">C1</option>
      <option value="C2">C2</option>
    </select>

    <label>Email de contacte *</label>
    <input type="email" id="mEmail" placeholder="alumne@exemple.com">

    <label>Telèfon de contacte *</label>
    <input type="tel" id="mTel" placeholder="600 123 456">

    <label>Observacions</label>
    <textarea id="mObs" placeholder="Opcional..."></textarea>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="tancarModal()">Cancel·lar</button>
      <button class="btn-send" id="btnEnviar" onclick="enviarSollicitud()">Enviar sol·licitud</button>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVbR-7FGuqdNFSG20lRq2ZAMuwjbsDCIO4A97w_SMur_kwYiCFMn8Wtl7fL0PlI-5b/exec';

var TOTS = [];
var FILTRATS = [];
var PAGINA = 1;
var PER_PAGINA = 50;
var LLIBRE_SELECCIONAT = null;

var ttip = document.getElementById('ttip');

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function trimText(s) {
  return String(s || '').replace(/^\s+|\s+$/g, '');
}

function lowerText(s) {
  return String(s || '').toLowerCase();
}

function carregarCataleg() {
  var xhr = new XMLHttpRequest();

  xhr.open('GET', 'catalogo.json?v=' + new Date().getTime(), true);

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var data = JSON.parse(xhr.responseText);

          if (!data || !data.length) {
            document.getElementById('status').innerHTML = 'No s’han trobat llibres.';
            return;
          }

          TOTS = [];

          for (var i = 0; i < data.length; i++) {
            TOTS.push(normalitzarLlibre(data[i]));
          }

          document.getElementById('status').style.display = 'none';

          omplirFiltres();
          filtrar();

        } catch (e) {
          document.getElementById('status').innerHTML = 'Error llegint catalogo.json.';
        }
      } else {
        document.getElementById('status').innerHTML = 'No s’ha pogut carregar catalogo.json.';
      }
    }
  };

  xhr.send(null);
}

function normalitzarLlibre(b) {
  var disponible = false;

  if (b.disponible === true) disponible = true;
  if (b.disponible === 1) disponible = true;
  if (b.disponible === '1') disponible = true;
  if (b.disponible === 'true') disponible = true;
  if (b.disponible === 'TRUE') disponible = true;
  if (b.disponible === 'Sí') disponible = true;
  if (b.disponible === 'SI') disponible = true;
  if (b.disponible === 'Disponible') disponible = true;

  return {
    codi: b.codi || b.referencia || b.referencia || '',
    titol: b.titol || b.titulo || '',
    autor: b.autor || '',
    editorial: b.editorial || '',
    idioma: b.idioma || '',
    nivell: b.nivell || b.nivel || '',
    genere: b.genere || b.genero || '',
    audio: b.audio || '',
    disponible: disponible
  };
}

function afegirOpcio(selectId, valor) {
  var select = document.getElementById(selectId);
  var opt = document.createElement('option');
  opt.value = valor;
  opt.innerHTML = esc(valor);
  select.appendChild(opt);
}

function omplirFiltres() {
  var idiomes = [];
  var nivells = [];
  var generes = [];

  for (var i = 0; i < TOTS.length; i++) {
    var b = TOTS[i];

    if (b.idioma && b.idioma.indexOf('@') < 0 && idiomes.indexOf(b.idioma) < 0) {
      idiomes.push(b.idioma);
    }

    if (b.nivell && b.nivell.indexOf('@') < 0 && nivells.indexOf(b.nivell) < 0) {
      nivells.push(b.nivell);
    }

    if (b.genere && b.genere.indexOf('@') < 0 && generes.indexOf(b.genere) < 0) {
      generes.push(b.genere);
    }
  }

  idiomes.sort();
  nivells.sort();
  generes.sort();

  for (var a = 0; a < idiomes.length; a++) afegirOpcio('filtreIdioma', idiomes[a]);
  for (var n = 0; n < nivells.length; n++) afegirOpcio('filtreNivell', nivells[n]);
  for (var g = 0; g < generes.length; g++) afegirOpcio('filtreGenere', generes[g]);
}

function filtrar() {
  if (!TOTS.length) return;

  var qT = lowerText(trimText(document.getElementById('cercaTitol').value));
  var qA = lowerText(trimText(document.getElementById('cercaAutor').value));
  var iI = document.getElementById('filtreIdioma').value;
  var iN = document.getElementById('filtreNivell').value;
  var iG = document.getElementById('filtreGenere').value;
  var iD = document.getElementById('filtreDisp').value;

  FILTRATS = [];

  for (var i = 0; i < TOTS.length; i++) {
    var b = TOTS[i];

    if (qT && lowerText(b.titol).indexOf(qT) < 0) continue;
    if (qA && lowerText(b.autor).indexOf(qA) < 0) continue;
    if (iI && b.idioma !== iI) continue;
    if (iN && b.nivell !== iN) continue;
    if (iG && b.genere !== iG) continue;
    if (iD === '1' && !b.disponible) continue;
    if (iD === '0' && b.disponible) continue;

    FILTRATS.push(b);
  }

  PAGINA = 1;
  renderPagina();
}

function renderPagina() {
  var totalPag = Math.ceil(FILTRATS.length / PER_PAGINA);
  if (totalPag < 1) totalPag = 1;

  var inici = (PAGINA - 1) * PER_PAGINA;
  var fi = inici + PER_PAGINA;
  if (fi > FILTRATS.length) fi = FILTRATS.length;

  var catalogo = document.getElementById('catalogo');
  catalogo.innerHTML = '';

  document.getElementById('infoBar').innerHTML =
    'Mostrant ' +
    (FILTRATS.length ? (inici + 1) + '–' + fi : 0) +
    ' de ' + FILTRATS.length +
    ' resultats (total: ' + TOTS.length + ' llibres)';

  if (!FILTRATS.length) {
    catalogo.innerHTML = '<p style="padding:30px;color:#94a3b8;">No s’han trobat llibres amb aquests filtres.</p>';
  } else {
    for (var i = inici; i < fi; i++) {
      catalogo.appendChild(crearCard(FILTRATS[i]));
    }
  }

  renderPaginacio(totalPag);
}

function crearCard(b) {
  var card = document.createElement('div');
  card.className = 'card';

  var html = '';

  html += '<div class="card-ref">Ref: ' + esc(b.codi) + '</div>';
  html += '<div class="card-title">' + esc(b.titol) + '</div>';
  html += '<div class="card-author">' + esc(b.autor);

  if (b.editorial) {
    html += ' · ' + esc(b.editorial);
  }

  html += '</div>';

  html += '<div class="badges">';

  if (b.idioma) {
    html += '<span class="badge badge-idioma">' + esc(b.idioma) + '</span>';
  }

  if (b.nivell) {
    html += '<span class="badge badge-nivell">' + esc(b.nivell) + '</span>';
  }

  if (b.genere) {
    html += '<span class="badge badge-genere">' + esc(b.genere) + '</span>';
  }

  if (b.disponible) {
    html += '<span class="badge badge-ok">Disponible</span>';
  } else {
    html += '<span class="badge badge-prestat">En préstec</span>';
  }

  if (b.audio) {
    html += '<span class="badge badge-audio" onmouseover="mostrarTooltip(event,\'' + escJS(b.audio) + '\')" onmousemove="moureTooltip(event)" onmouseout="amagarTooltip()">Àudio</span>';
  }

  html += '</div>';

  if (b.disponible) {
    html += '<button class="card-btn">Sol·licitar préstec</button>';
  } else {
    html += '<button class="card-btn" disabled>No disponible</button>';
  }

  card.innerHTML = html;

  var btn = card.getElementsByTagName('button')[0];

  if (b.disponible) {
    btn.onclick = function() {
      obrirModal(b);
    };
  }

  return card;
}

function renderPaginacio(totalPag) {
  var p = document.getElementById('pagination');
  var html = '';

  if (totalPag <= 1) {
    p.innerHTML = '';
    return;
  }

  html += '<button onclick="canviaPagina(-1)"';
  if (PAGINA === 1) html += ' disabled';
  html += '>Anterior</button>';

  html += '<span>Pàgina ' + PAGINA + ' de ' + totalPag + '</span>';

  html += '<button onclick="canviaPagina(1)"';
  if (PAGINA === totalPag) html += ' disabled';
  html += '>Següent</button>';

  p.innerHTML = html;
}

function canviaPagina(dir) {
  var totalPag = Math.ceil(FILTRATS.length / PER_PAGINA);
  if (totalPag < 1) totalPag = 1;

  PAGINA = PAGINA + dir;

  if (PAGINA < 1) PAGINA = 1;
  if (PAGINA > totalPag) PAGINA = totalPag;

  renderPagina();

  if (window.scrollTo) {
    window.scrollTo(0, 0);
  }
}

function escJS(s) {
  return String(s || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;')
    .replace(/\n/g, ' ');
}

function mostrarTooltip(e, txt) {
  ttip.innerHTML = esc(txt);
  ttip.style.display = 'block';
  moureTooltip(e);
}

function moureTooltip(e) {
  if (ttip.style.display !== 'block') return;

  var x = e.clientX - (ttip.offsetWidth / 2);
  var y = e.clientY - ttip.offsetHeight - 14;
  var vw = window.innerWidth || document.documentElement.clientWidth;

  if (x < 8) x = 8;
  if (x + ttip.offsetWidth + 8 > vw) x = vw - ttip.offsetWidth - 8;
  if (y < 8) y = e.clientY + 18;

  ttip.style.left = x + 'px';
  ttip.style.top = y + 'px';
}

function amagarTooltip() {
  ttip.style.display = 'none';
}

function obrirModal(b) {
  LLIBRE_SELECCIONAT = b;

  document.getElementById('modalBookInfo').innerHTML =
    '<strong>' + esc(b.titol) + '</strong><br>' +
    esc(b.autor) +
    '<br><small>Ref: ' + esc(b.codi) + '</small>';

  document.getElementById('mNom').value = '';
  document.getElementById('mCurs').value = '';
  document.getElementById('mEmail').value = '';
  document.getElementById('mTel').value = '';
  document.getElementById('mObs').value = '';

  document.getElementById('modalOverlay').style.display = 'block';
}

function tancarModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  LLIBRE_SELECCIONAT = null;
}

function enviarSollicitud() {
  var nom = trimText(document.getElementById('mNom').value);
  var curs = document.getElementById('mCurs').value;
  var email = trimText(document.getElementById('mEmail').value);
  var tel = trimText(document.getElementById('mTel').value);
  var obs = trimText(document.getElementById('mObs').value);

  if (!nom || !curs || !email || !tel) {
    alert('Nom, curs, email i telèfon són obligatoris.');
    return;
  }

  if (!LLIBRE_SELECCIONAT) {
    alert('No hi ha cap llibre seleccionat.');
    return;
  }

  var btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.innerHTML = 'Enviant...';

  var payload = {
    nom: nom,
    curs: curs,
    email: email,
    tel: tel,
    codi: LLIBRE_SELECCIONAT.codi,
    titol: LLIBRE_SELECCIONAT.titol,
    obs: obs
  };

  var xhr = new XMLHttpRequest();

  xhr.open('POST', SCRIPT_URL, true);
  xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      btn.disabled = false;
      btn.innerHTML = 'Enviar sol·licitud';

      try {
        var data = JSON.parse(xhr.responseText);

        if (data.ok) {
          tancarModal();
          alert('Sol·licitud enviada. La biblioteca es posarà en contacte amb tu.');
        } else {
          alert('Error: ' + (data.error || 'Desconegut'));
        }
      } catch (e) {
        alert('La sol·licitud s’ha enviat, però no s’ha pogut llegir la resposta del servidor.');
        tancarModal();
      }
    }
  };

  xhr.onerror = function() {
    btn.disabled = false;
    btn.innerHTML = 'Enviar sol·licitud';
    alert('Error de connexió.');
  };

  xhr.send(JSON.stringify(payload));
}

document.getElementById('modalOverlay').onclick = function(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    tancarModal();
  }
};

carregarCataleg();
</script>

</body>
</html>
